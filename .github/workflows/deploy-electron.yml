name: Release Electron Desktop App

on:
  push:
    tags:
      - 'v*' # Trigger build and release when pushing version tags, e.g. v1.0.0

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest # Build on Windows to generate a Windows installer (.exe)
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and Package Electron App
        run: npm run electron:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
